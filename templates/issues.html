<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Issue | Smart Campus</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1d2671, #c33764);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .issue-card {
            width: 500px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .issue-card header {
            background: #0d6efd;
            color: white;
            padding: 15px;
            border-radius: 15px 15px 0 0;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="issue-card">
    <header>
        <h4>Report an Issue</h4>
        <small>Fill the details carefully</small>
    </header>

    <div class="p-4">

        <!-- Flash Message -->
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="alert alert-success text-center">
                {{ messages[0] }}
            </div>
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Issue Title</label>
                <input type="text" name="title" class="form-control" placeholder="Eg: Water leakage" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Category</label>
                <select name="category" class="form-select" required>
                    <option value="">Select category</option>
                    <option>Electrical</option>
                    <option>Plumbing</option>
                    <option>Classroom</option>
                    <option>Hostel</option>
                    <option>Internet</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="4"
                          placeholder="Describe the issue in detail..." required></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Submit Issue
            </button>
        </form>

        <div class="text-center mt-3">
            <a href="{{ url_for('dashboard') }}">← Back to Dashboard</a>
        </div>
    </div>
</div>

</body>
</html>
