<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Register | Smart Campus</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    min-height:100vh;
    background:
        radial-gradient(circle at top left,#00ffe7,transparent 40%),
        radial-gradient(circle at bottom right,#7f00ff,transparent 40%),
        linear-gradient(120deg,#05070f,#0b1020);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Segoe UI',sans-serif;
}

.ai-card{
    width:420px;
    padding:35px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    box-shadow:0 0 40px rgba(0,255,231,.35);
    animation:pop 0.9s ease;
}
@keyframes pop{
    from{opacity:0;transform:scale(.9) translateY(40px)}
    to{opacity:1;transform:scale(1)}
}

.ai-title{
    text-align:center;
    font-weight:800;
    letter-spacing:2px;
    margin-bottom:25px;
    background:linear-gradient(90deg,#00ffe7,#7f00ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.form-control,.form-select{
    background:rgba(255,255,255,0.12);
    border:none;
    color:#fff;
    border-radius:12px;
    padding:12px;
}
.form-control::placeholder{color:#ccc}
.form-control:focus,.form-select:focus{
    box-shadow:0 0 15px rgba(0,255,231,.7);
    background:rgba(255,255,255,0.18);
    color:#fff;
}

.ai-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:14px;
    font-weight:700;
    background:linear-gradient(90deg,#00ffe7,#7f00ff);
}
.ai-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 0 25px rgba(127,0,255,.9);
}

.alert{
    background:rgba(255,0,0,0.15);
    border:none;
    color:#fff;
    border-radius:12px;
}

a{color:#00ffe7;text-decoration:none}
</style>
</head>

<body>

<div class="ai-card">
    <h3 class="ai-title">AI REGISTRATION</h3>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="alert text-center mb-3">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="text" name="name" class="form-control mb-3" placeholder="👤 Name" required>

        <input type="email" name="email" class="form-control mb-3" placeholder="📧 Email" required>

        <input type="password" name="password" class="form-control mb-3" placeholder="🔒 Password" required>

        <select name="role" class="form-select mb-4" required>
            <option value="">🤖 Select Role</option>
            <option value="staff">Staff</option>
            <option value="student">Student</option>
        </select>

        <button class="ai-btn">CREATE ACCOUNT</button>
    </form>

    <div class="text-center mt-4">
        Already registered?
        <a href="{{ url_for('login') }}">Login</a>
    </div>
</div>

</body>
</html>
