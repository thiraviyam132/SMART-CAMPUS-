{% extends "base.html" %}
{% block title %}Smart Campus | Create an Account{% endblock %}

{% block content %}
<main class="hero-shell" style="max-width: 500px;">
    <p class="section-sub mb-1">Welcome</p>
    <h2 class="section-title">Create an Account</h2>
    <p class="section-sub mb-3">Create an account to raise and track campus issues professionally</p>

    <form method="POST" class="text-start">
        <label class="form-label fw-semibold">Full Name</label>
        <input type="text" name="name" class="form-control input-modern mb-3" placeholder="Enter your full name" required>

        <label class="form-label fw-semibold">Email</label>
        <input type="email" name="email" class="form-control input-modern mb-3" placeholder="you@example.com" required>

        <label class="form-label fw-semibold">Password</label>
        <input type="password" name="password" class="form-control input-modern mb-3" placeholder="Create a password" required>

        <label class="form-label fw-semibold">Role</label>
        <select name="role" class="form-select input-modern mb-4" required>
            <option value="">Select role</option>
            <option value="staff">Staff</option>
            <option value="student">Student</option>
        </select>

        <button type="submit" class="btn btn-brand w-100">Create Account</button>
    </form>

    <p class="mt-3 mb-0 section-sub">
        Already registered? <a href="{{ url_for('login') }}" class="fw-semibold auth-link">Login</a>
    </p>
</main>
{% endblock %}
