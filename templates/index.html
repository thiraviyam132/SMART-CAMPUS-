<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Campus | Issue & Feedback System</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            border-radius: 15px;
            padding: 40px;
            background: white;
            color: #333;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }
        .btn-custom {
            width: 150px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1 class="mb-3">🏫 Smart Campus</h1>
    <p class="mb-4">
        Issue & Feedback Tracking System  
        <br>
        <small class="text-muted">Report problems • Track status • Improve campus</small>
    </p>

    <div class="d-flex justify-content-center gap-3">
        <a href="{{ url_for('login') }}" class="btn btn-primary btn-custom">
            Login
        </a>
        <a href="{{ url_for('register') }}" class="btn btn-success btn-custom">
            Register
        </a>
    </div>
</div>

</body>
</html>
