<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Smart Campus</title>
    <style>
        /* --------- BODY & BACKGROUND --------- */
        body {
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            overflow: hidden;
        }

        /* ---------- LOGIN BOX ---------- */
        .login-box {
            background: white;
            width: 400px;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
            animation: popIn 0.8s ease;
        }

        /* Pop-in animation */
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            60% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); }
        }

        /* ---------- HEADINGS ---------- */
        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #f5576c;
            font-size: 28px;
            letter-spacing: 1px;
        }

        /* ---------- INPUT FIELDS ---------- */
        input {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        /* Input focus animation */
        input:focus {
            border-color: #f093fb;
            box-shadow: 0 0 10px rgba(240, 147, 251, 0.5);
            outline: none;
        }

        /* ---------- BUTTON ---------- */
        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background: linear-gradient(90deg, #f093fb, #f5576c, #ffcc70);
            background-size: 200% 200%;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        button:hover {
            background-position: right center;
            transform: scale(1.05);
        }

        /* ---------- FLASH MESSAGE ---------- */
        .flash {
            background: #ffe3e3;
            color: #d32f2f;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            text-align: center;
            animation: fadeDown 0.6s ease;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ---------- REGISTER LINK ---------- */
        .register-link {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
        }

        .register-link a {
            text-decoration: none;
            font-weight: bold;
            background: linear-gradient(90deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: all 0.3s ease;
        }

        .register-link a:hover {
            color: #f093fb;
        }

        /* ---------- BACKGROUND ANIMATION BUBBLES ---------- */
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            animation: floatBubble 6s infinite;
        }

        @keyframes floatBubble {
            0% { transform: translateY(0) scale(1); opacity: 0.5; }
            50% { transform: translateY(-200px) scale(1.2); opacity: 0.8; }
            100% { transform: translateY(0) scale(1); opacity: 0.5; }
        }

    </style>
</head>
<body>

<!-- Floating bubbles for colorful effect -->
<div class="bubble" style="width: 60px; height: 60px; left: 10%; animation-delay: 0s;"></div>
<div class="bubble" style="width: 40px; height: 40px; left: 70%; animation-delay: 1s;"></div>
<div class="bubble" style="width: 80px; height: 80px; left: 50%; animation-delay: 2s;"></div>
<div class="bubble" style="width: 50px; height: 50px; left: 30%; animation-delay: 3s;"></div>

<div class="login-box">
    <h2>Smart Campus Login</h2>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="flash">
                {{ messages[0] }}
            </div>
        {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="register-link">
        Don't have an account? <a href="{{ url_for('register') }}">Register</a>
    </div>
</div>

</body>
</html>
